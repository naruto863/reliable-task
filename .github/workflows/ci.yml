name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run-mysql-it:
        description: "Run Testcontainers MySQL integration tests"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  maven-test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B test

  mysql-it:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run-mysql-it

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Testcontainers MySQL integration tests
        run: mvn -B -Pmysql-it -pl reliable-task-store,reliable-task-executor -am test
