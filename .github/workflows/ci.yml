name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run-mysql-it:
        description: "Run Testcontainers MySQL integration tests"
        required: false
        type: boolean
        default: false
      run-console-smoke:
        description: "Run Playwright console smoke tests"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  maven-test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B test

  mysql-it:
    name: MySQL Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run-mysql-it

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Testcontainers MySQL integration tests
        run: mvn -B -Pmysql-it -pl reliable-task-store,reliable-task-executor -am test

  console-test:
    name: Console Typecheck, Test, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: reliable-task-console

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reliable-task-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

  console-smoke:
    name: Console Playwright Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run-console-smoke

    defaults:
      run:
        working-directory: reliable-task-console

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reliable-task-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Smoke tests
        run: npm run test:smoke
