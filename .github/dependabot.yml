version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - security

  - package-ecosystem: npm
    directory: /reliable-task-console
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - security

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Asia/Shanghai
    labels:
      - dependencies
      - security
